<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的網頁 - 貪吃蛇終極版</title>
    <meta name="google-site-verification" content="o2tujYDnPtgd0de1_45C6pm8zcjVuLcJxUBz19kvVUc" />
    <style>
        body { text-align: center; background-color: #222; color: white; font-family: sans-serif; margin: 0; padding: 10px; overflow: hidden; }
        #game-container { position: relative; max-width: 400px; margin: auto; }
        canvas { background: #000; display: block; margin: 10px auto; border: 4px solid #555; max-width: 100%; height: auto; touch-action: none; }
        
        /* 初始與結束畫面遮罩 */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }

        .stats { font-size: 18px; margin-bottom: 10px; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 180px; margin: 15px auto; }
        
        button { padding: 12px; font-size: 18px; cursor: pointer; border-radius: 8px; border: none; background: #444; color: white; }
        button:active { background: #666; }
        .btn-main { background: #2ecc71; padding: 15px 30px; font-size: 20px; font-weight: bold; }
        .btn-nav { background: #555; width: 70px; margin: 5px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="game-ui">
        <h1>你好！這是我在 Acode 做的網頁</h1>
        <p>準備中...</p>
    </div>

    <div id="snake-game" style="display:none;">
        <div class="stats">
            分數: <b id="score">0</b> | 生命: <b id="lives" style="color:red;">3</b>
        </div>
        
        <div id="game-container">
            <div id="overlay">
                <h2 id="msg-title">貪吃蛇遊戲</h2>
                <button class="btn-main" onclick="startGame()">開始遊戲</button>
            </div>
            <canvas id="gc" width="400" height="400"></canvas>
        </div>

        <div class="controls">
            <button style="grid-column:2" onclick="changeDir(0,-1)">↑</button>
            <button style="grid-column:1" onclick="changeDir(-1,0)">←</button>
            <button style="grid-column:3" onclick="changeDir(1,0)">→</button>
            <button style="grid-column:2" onclick="changeDir(0,1)">↓</button>
        </div>

        <div>
            <button class="btn-nav" onclick="togglePause()">暫停/繼續</button>
            <button class="btn-nav" onclick="resetGame()">重新開始</button>
            <button class="btn-nav" onclick="location.reload()">回首頁</button>
        </div>
    </div>

    <script>
        // 1秒後切換到遊戲大廳
        setTimeout(() => {
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('snake-game').style.display = 'block';
            initCanvas();
        }, 1000);

        let canvas, ctx;
        let px=10, py=10, gs=20, tc=20;
        let ax=15, ay=15, xv=0, yv=0;
        let trail=[], tail = 5, score = 0, lives = 3;
        let paused = true, gameRunning = false;

        function initCanvas() {
            canvas = document.getElementById("gc");
            ctx = canvas.getContext("2d");
            document.addEventListener("keydown", keyPush);
            setInterval(game, 1000/10);
            drawStatic();
        }

        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            paused = false;
            gameRunning = true;
            if(lives <= 0) resetGame();
        }

        function drawStatic() {
            ctx.fillStyle="black";
            ctx.fillRect(0,0,canvas.width,canvas.height);
        }

        function game() {
            if(paused || !gameRunning) return;

            px += xv; py += yv;

            // --- 撞牆判定 ---
            if(px < 0 || px > tc-1 || py < 0 || py > tc-1) {
                loseLife("你撞牆了！");
                return;
            }

            ctx.fillStyle="black";
            ctx.fillRect(0,0,canvas.width,canvas.height);

            ctx.fillStyle="lime";
            for(let i=0; i<trail.length; i++) {
                ctx.fillRect(trail[i].x*gs,trail[i].y*gs,gs-2,gs-2);
                // --- 撞到自己判定 ---
                if(trail[i].x==px && trail[i].y==py && (xv!=0 || yv!=0)) {
                    loseLife("你咬到自己了！");
                }
            }
            trail.push({x:px,y:py});
            while(trail.length>tail) { trail.shift(); }

            if(ax==px && ay==py) {
                tail++; score++;
                document.getElementById("score").innerText = score;
                ax=Math.floor(Math.random()*tc); ay=Math.floor(Math.random()*tc);
            }
            ctx.fillStyle="red";
            ctx.fillRect(ax*gs,ay*gs,gs-2,gs-2);
        }

        function changeDir(x, y) {
            if(paused) return;
            if ((x === 1 && xv === -1) || (x === -1 && xv === 1)) return;
            if ((y === 1 && yv === -1) || (y === -1 && yv === 1)) return;
            xv = x; yv = y;
        }

        function keyPush(evt) {
            switch(evt.keyCode) {
                case 37: changeDir(-1,0); break;
                case 38: changeDir(0,-1); break;
                case 39: changeDir(1,0); break;
                case 40: changeDir(0,1); break;
            }
        }

        function loseLife(reason) {
            lives--;
            document.getElementById("lives").innerText = lives;
            xv=0; yv=0; px=10; py=10; // 重置位置
            paused = true;
            
            let overlay = document.getElementById('overlay');
            let title = document.getElementById('msg-title');
            overlay.style.display = 'flex';
            
            if(lives <= 0) {
                title.innerText = "遊戲結束！ 分數: " + score;
                title.style.color = "red";
            } else {
                title.innerText = reason + " 剩餘生命: " + lives;
                title.style.color = "yellow";
            }
        }

        function togglePause() { if(gameRunning) paused = !paused; }
        
        function resetGame() {
            px=10; py=10; xv=0; yv=0; tail=5; score=0; lives=3;
            document.getElementById("score").innerText = score;
            document.getElementById("lives").innerText = lives;
            document.getElementById('msg-title').innerText = "貪吃蛇遊戲";
            document.getElementById('msg-title').style.color = "white";
            startGame();
        }
    </script>
</body>
</html>
