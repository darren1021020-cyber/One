<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的遊戲大廳</title>
    <meta name="google-site-verification" content="o2tujYDnPtgd0de1_45C6pm8zcjVuLcJxUBz19kvVUc" />
    <style>
        body { text-align: center; background-color: #222; color: white; font-family: sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        #game-ui { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #menu { display: none; flex-direction: column; gap: 20px; align-items: center; padding-top: 50px; }
        canvas { background: #000; display: block; margin: 10px auto; border: 4px solid #555; max-width: 90vw; height: auto; touch-action: none; }
        .stats { font-size: 18px; margin-bottom: 10px; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 210px; margin: 15px auto; }
        button { padding: 15px; font-size: 18px; cursor: pointer; border-radius: 8px; border: none; background: #444; color: white; touch-action: manipulation; }
        .btn-game { background: #3498db; width: 200px; font-size: 20px; }
        .btn-nav { background: #555; width: 80px; font-size: 14px; margin: 5px; }
        #game-area { display: none; }
    </style>
</head>
<body>

    <div id="game-ui">
        <h1>你好！歡迎來到我的網頁</h1>
        <p>載入中...</p>
    </div>

    <div id="menu">
        <h2>請選擇遊戲</h2>
        <button class="btn-game" onclick="selectGame('snake')">貪吃蛇</button>
        <button class="btn-game" onclick="selectGame('tetris')" style="background:#e67e22">俄羅斯方塊</button>
    </div>

    <div id="game-area">
        <div class="stats">
            遊戲: <span id="game-name"></span> | 分數: <b id="score">0</b> | 生命: <b id="lives" style="color:red;">3</b>
        </div>
        
        <canvas id="gc"></canvas>

        <div class="controls" id="snake-ctrls">
            <button style="grid-column:2" onclick="handleInput('up')">↑</button>
            <button style="grid-column:1" onclick="handleInput('left')">←</button>
            <button style="grid-column:3" onclick="handleInput('right')">→</button>
            <button style="grid-column:2" onclick="handleInput('down')">↓</button>
        </div>

        <div class="controls" id="tetris-ctrls" style="display:none;">
            <button onclick="handleInput('left')">←</button>
            <button onclick="handleInput('rotate')">旋轉</button>
            <button onclick="handleInput('right')">→</button>
            <button style="grid-column:2" onclick="handleInput('down')">↓</button>
        </div>

        <div>
            <button class="btn-nav" onclick="togglePause()">暫停</button>
            <button class="btn-nav" onclick="location.reload()">回選單</button>
        </div>
    </div>

    <script>
        let canvas = document.getElementById("gc");
        let ctx = canvas.getContext("2d");
        let score = 0, lives = 3, paused = false, currentGame = '';
        let gameLoop;

        // --- 初始邏輯 ---
        setTimeout(() => {
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
        }, 1000);

        function selectGame(game) {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            currentGame = game;
            score = 0; lives = 3; paused = false;
            document.getElementById('score').innerText = score;
            document.getElementById('lives').innerText = lives;
            
            if(game === 'snake') {
                document.getElementById('game-name').innerText = '貪吃蛇';
                document.getElementById('snake-ctrls').style.display = 'grid';
                document.getElementById('tetris-ctrls').style.display = 'none';
                initSnake();
            } else {
                document.getElementById('game-name').innerText = '俄羅斯方塊';
                document.getElementById('snake-ctrls').style.display = 'none';
                document.getElementById('tetris-ctrls').style.display = 'grid';
                initTetris();
            }
        }

        // --- 共通控制 ---
        function handleInput(dir) {
            if(paused) return;
            if(currentGame === 'snake') snakeInput(dir);
            else tetrisInput(dir);
        }

        function togglePause() { paused = !paused; }

        function die(msg) {
            lives--;
            document.getElementById('lives').innerText = lives;
            if(lives <= 0) {
                alert("遊戲結束！最終分數: " + score);
                location.reload();
            } else {
                alert(msg + " 剩餘生命: " + lives);
                if(currentGame === 'snake') resetSnake();
                else resetTetris();
            }
        }

        // ================= 貪吃蛇邏輯 =================
        let px, py, xv, yv, trail, tail;
        const gs = 20, tc = 20;

        function initSnake() {
            canvas.width = canvas.height = 400;
            resetSnake();
            if(gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(updateSnake, 1000/10);
        }

        function resetSnake() {
            px=10; py=10; xv=0; yv=0; trail=[]; tail=5;
            ax=15; ay=15;
        }

        function updateSnake() {
            if(paused) return;
