<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Darren 遊戲</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            --case-yellow: #e4c541;
            --screen-frame: #000000;
            --lcd-bg: #9ead86;
            --btn-blue: #4a90e2;
            --btn-blue-dark: #1c5980;
            --btn-green: #44db5e;
            --btn-red: #ff3b30;
        }
        /* 禁止頁面捲動與縮放 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; touch-action: manipulation; }
        body { background-color: #000; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; font-family: 'ZCOOL KuaiLe', sans-serif; }

        .game-console {
            background-color: var(--case-yellow);
            width: 100vw; max-width: 480px; height: 100dvh;
            display: flex; flex-direction: column; align-items: center;
            position: relative; box-shadow: inset 0 0 60px rgba(0,0,0,0.15);
        }
        .header-title { margin-top: 10px; font-size: 20px; font-weight: bold; letter-spacing: 5px; color: #111; }

        .screen-area {
            width: 90%; margin-top: 10px; border: 10px solid var(--screen-frame);
            padding: 8px; border-radius: 8px; background: #222; display: flex; flex-direction: column; position: relative;
        }

        .lcd-display {
            background: var(--lcd-bg); width: 100%; height: 400px; position: relative;
            box-shadow: inset 4px 4px 12px rgba(0,0,0,0.4); border: 2px solid #7a8a64;
        }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }

        /* 控制區稍微縮小以適應 Chrome */
        .controller-section { 
            width: 100%; flex-grow: 1; display: grid; grid-template-columns: 1.1fr 0.9fr; 
            padding: 10px; transform: scale(0.95); transform-origin: top;
        }
        
        .d-pad { 
            display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); 
            gap: 5px; align-self: center; justify-self: center;
        }
        .btn-blue {
            background: radial-gradient(circle, var(--btn-blue) 30%, var(--btn-blue-dark) 100%);
            border-radius: 50%; border: 4px solid #154666; box-shadow: 0 5px 0 #0d2d42; cursor: pointer;
        }
        .btn-blue:active { transform: translateY(3px); box-shadow: 0 2px 0 #0d2d42; }

        .action-pad { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        .small-btns { display: flex; gap: 12px; }
        .s-btn { width: 38px; height: 38px; border-radius: 50%; border: 3px solid #222; cursor: pointer; box-shadow: 0 3px 0 #333; }
        .btn-red { background: var(--btn-red); } .btn-green { background: var(--btn-green); }

        .rotate-btn {
            width: 110px; height: 110px; border-radius: 50%;
            background: radial-gradient(circle, var(--btn-blue) 30%, var(--btn-blue-dark) 100%);
            border: 6px solid #154666; color: white; font-weight: bold; font-size: 20px; box-shadow: 0 7px 0 #0d2d42; cursor: pointer;
        }
        .btn-label { font-size: 10px; color: #111; font-weight: bold; margin-top: 5px; text-align: center;}

        .ui-overlay { position: absolute; inset: 0; background: var(--lcd-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        .menu-btn { width: 180px; padding: 12px; margin: 8px; font-size: 18px; background: #333; color: #fff; border: none; border-radius: 10px; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="game-console" id="console">
    <div class="header-title">▪ Darren 遊戲 ▪</div>
    <div class="screen-area">
        <div class="lcd-display">
            <div id="stats-ui" class="stats-panel hidden">
                HI:<span id="hi">0</span> SCORE:<span id="sc">0</span> LIFE:<span id="lives">3</span>
            </div>
            <div id="menu-ui" class="ui-overlay">
                <h2 style="margin-bottom:20px; color:#222;">Darren 遊戲</h2>
                <button class="menu-btn" onclick="startGame('tetris')">經典俄羅斯</button>
                <button class="menu-btn" style="background:#444" onclick="startGame('snake')">經典貪吃蛇</button>
                <p style="font-size:10px; margin-top:10px; color:#555;">點擊按鈕將進入全螢幕</p>
            </div>
            <canvas id="gc"></canvas>
        </div>
    </div>

    <div class="controller-section">
        <div class="d-pad">
            <div></div><button class="btn-blue" onclick="handleInput('up')"></button><div></div>
            <button class="btn-blue" onclick="handleInput('left')"></button>
            <div style="display:flex; align-items:center; justify-content:center; color:#333; font-size:10px; font-weight:bold;">MOVE</div>
            <button class="btn-blue" onclick="handleInput('right')"></button>
            <div></div><button class="btn-blue" onclick="handleInput('down')"></button><div></div>
        </div>
        <div class="action-pad">
            <div class="small-btns">
                <div style="text-align:center"><button class="s-btn btn-red" onclick="location.reload()"></button><div class="btn-label">重置</div></div>
                <div style="text-align:center"><button class="s-btn btn-green" onclick="togglePause()"></button><div class="btn-label">暫停</div></div>
            </div>
            <div style="text-align:center">
                <button class="rotate-btn" onclick="handleInput('rotate')">旋轉</button>
                <div class="btn-label">ROTATE</div>
            </div>
        </div>
    </div>
</div>

<script>
    // 全螢幕觸發函數
    function toggleFullScreen() {
        const doc = window.document;
        const docEl = doc.documentElement;
        const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
        if (requestFullScreen) {
            requestFullScreen.call(docEl);
        }
    }

    function startGame(mode) {
        toggleFullScreen(); // 在點擊時進入全螢幕
        initGame(mode);
    }

    // --- 以下為原有的遊戲邏輯 (略作微調以適應佈局) ---
    const canvas = document.getElementById('gc');
    const ctx = canvas.getContext('2d');
    let gameLoop, mode, score=0, hiScore=0, lives=3, isPaused=false, speed=500;
    const COLS = 10, ROWS = 18; 
    let board, cur, curP, curColor, snake, food, dir;

    const SHAPES = [
        {s:[[1,1,1,1]], c:'#2980b9'}, {s:[[1,1],[1,1]], c:'#f1c40f'},
        {s:[[0,1,0],[1,1,1]], c:'#8e44ad'}, {s:[[1,1,0],[0,1,1]], c:'#27ae60'},
        {s:[[0,1,1],[1,1,0]], c:'#e67e22'},
        {s:[[1,0,0],[1,1,1]], c:'#d35400'}, {s:[[0,0,1],[1,1,1]], c:'#2c3e50'}
    ];

    function initGame(m) {
        mode = m;
        document.getElementById('menu-ui').classList.add('hidden');
        document.getElementById('stats-ui').classList.remove('hidden');
        canvas.width = 300; canvas.height = 540; 
        lives = 3; score = 0;
        resetRound();
    }

    function resetRound() {
        isPaused = false;
        if(mode === 'tetris') { speed = 500; board = Array(ROWS).fill().map(()=>Array(COLS).fill(0)); newPiece(); }
        else { speed = 180; snake = [{x:5, y:8}, {x:5, y:9}, {x:5, y:10}]; dir = {x:0, y:-1}; spawnFood(); }
        if(gameLoop) clearInterval(gameLoop);
        gameLoop = setInterval(update, speed);
        updateStats();
    }

    function update() {
        if(isPaused) return;
        if(mode === 'tetris') updateTetris();
        else updateSnake();
    }

    function newPiece() {
        const r = SHAPES[Math.floor(Math.random()*SHAPES.length)];
        cur = r.s; curColor = r.c; curP = {x:Math.floor(COLS/2)-1, y:0};
        if(collide()) handleDeath();
        updateStats();
    }

    function collide() {
        for(let y=0; y<cur.length; y++) for(let x=0; x<cur[y].length; x++)
        if(cur[y][x] && (board[curP.y+y] === undefined || curP.x+x < 0 || curP.x+x >= COLS || board[curP.y+y][curP.x+x])) return true;
        return false;
    }

    function updateTetris() {
        curP.y++;
        if(collide()) { curP.y--; freeze(); clearLines(); newPiece(); }
        draw();
    }

    function freeze() { cur.forEach((r,y)=>r.forEach((v,x)=>{ if(v) board[curP.y+y][curP.x+x]=curColor; })); }

    function clearLines() {
        for(let y=board.length-1; y>=0; y--) if(board[y].every(v=>v!==0)) { board.splice(y,1); board.unshift(Array(COLS).fill(0)); score+=100; updateStats(); y++; }
    }

    function spawnFood() { food = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)}; }

    function updateSnake() {
        const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
        if(head.x<0 || head.x>=COLS || head.y<0 || head.y>=ROWS || snake.some(s=>s.x===head.x && s.y===head.y)) return handleDeath();
        snake.unshift(head);
        if(head.x === food.x && head.y === food.y) { score+=10; updateStats(); spawnFood(); }
        else snake.pop();
        draw();
    }

    function handleDeath() {
        lives--; updateStats();
        if(lives > 0) { alert("Darren 加油！剩餘：" + lives); resetRound(); }
        else { alert("遊戲結束！"); location.reload(); }
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        const bw = canvas.width / COLS, bh = canvas.height / ROWS;
        ctx.strokeStyle = "rgba(0, 0, 0, 0.08)";
        for(let x=0; x<=COLS; x++) { ctx.beginPath(); ctx.moveTo(x*bw, 0); ctx.lineTo(x*bw, canvas.height); ctx.stroke(); }
        for(let y=0; y<=ROWS; y++) { ctx.beginPath(); ctx.moveTo(0, y*bh); ctx.lineTo(canvas.width, y*bh); ctx.stroke(); }
        if(mode === 'tetris') {
            board.forEach((r,y)=>r.forEach((v,x)=>{ if(v) drawBlock(x,y,v,bw,bh); }));
            cur.forEach((r,y)=>r.forEach((v,x)=>{ if(v) drawBlock(curP.x+x, curP.y+y, curColor, bw, bh); }));
        } else {
            snake.forEach(s => drawBlock(s.x, s.y, "#222", bw, bh));
            drawBlock(food.x, food.y, "#ff3b30", bw, bh);
        }
    }

    function drawBlock(x,y,c,w,h) {
        ctx.fillStyle=c; ctx.fillRect(x*w+1,y*h+1,w-2,h-2);
        ctx.strokeStyle="rgba(255,255,255,0.2)"; ctx.strokeRect(x*w+1,y*h+1,w-2,h-2);
    }

    function handleInput(key) {
        if(isPaused) return;
        if(mode === 'tetris') {
            if(key==='left'){ curP.x--; if(collide())curP.x++; }
            if(key==='right'){ curP.x++; if(collide())curP.x--; }
            if(key==='down'){ curP.y++; if(collide())curP.y--; }
            if(key==='rotate'||key==='up'){ let n=cur[0].map((_,i)=>cur.map(r=>r[i]).reverse()); let p=cur; cur=n; if(collide())cur=p; }
        } else {
            if(key==='up' && dir.y===0) dir = {x:0, y:-1};
            if(key==='down' && dir.y===0) dir = {x:0, y:1};
            if(key==='left' && dir.x===0) dir = {x:-1, y:0};
            if(key==='right' && dir.x===0) dir = {x:1, y:0};
        }
        draw();
    }

    function togglePause() { isPaused = !isPaused; }
    function updateStats() {
        document.getElementById('sc').innerText = score;
        document.getElementById('hi').innerText = hiScore;
        document.getElementById('lives').innerText = lives;
    }
</script>
</body>
</html>
