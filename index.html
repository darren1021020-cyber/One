<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Darren 終極遊戲基地</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --case-yellow: #e4c541; --screen-frame: #000; --lcd-bg: #9ead86; --btn-blue: #4a90e2; --btn-blue-dark: #1c5980; --btn-red: #ff3b30; --btn-green: #44db5e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; font-family: 'ZCOOL KuaiLe', sans-serif; color: white; }
        .hidden { display: none !important; }

        /* 門面入口 */
        #main-menu { display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 100; }
        .portal-btn { width: 260px; padding: 22px; font-size: 24px; border: none; border-radius: 15px; cursor: pointer; color: white; font-family: 'ZCOOL KuaiLe'; box-shadow: 0 6px 0 #222; transition: 0.1s; }
        .portal-btn:active { transform: translateY(4px); box-shadow: none; }

        /* 遊戲機本體 */
        .game-console { background: var(--case-yellow); width: 100vw; max-width: 480px; height: 100dvh; display: flex; flex-direction: column; align-items: center; position: relative; color: #000; }
        .header-title { margin: 8px 0; font-size: 18px; font-weight: bold; letter-spacing: 5px; }
        .screen-area { width: 92%; border: 10px solid var(--screen-frame); padding: 5px; border-radius: 8px; background: #222; }
        .lcd-display { background: var(--lcd-bg); width: 100%; height: 480px; position: relative; box-shadow: inset 4px 4px 12px rgba(0,0,0,0.4); border: 2px solid #7a8a64; overflow: hidden; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; }
        
        .stats { position: absolute; left: 8px; top: 8px; font-size: 14px; font-weight: bold; z-index: 10; color: #000; line-height: 1.2; }
        .ui-overlay { position: absolute; inset: 0; background: var(--lcd-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        .menu-btn { width: 180px; padding: 12px; margin: 8px; font-size: 18px; background: #333; color: #fff; border: none; border-radius: 10px; cursor: pointer; }
        
        .how-to-play { margin-top: 15px; font-size: 14px; color: #333; text-align: center; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 10px; line-height: 1.5; }

        /* 控制器 */
        .controller { width: 100%; flex-grow: 1; display: grid; grid-template-columns: 1.1fr 0.9fr; padding: 25px 5px 5px 5px; transform: scale(0.92); transform-origin: top; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 72px); grid-template-rows: repeat(3, 72px); gap: 10px; justify-self: center; align-self: center; }
        .btn-direction { background: radial-gradient(circle, var(--btn-blue) 30%, var(--btn-blue-dark) 100%); border-radius: 50%; border: 4px solid #154666; box-shadow: 0 6px 0 #0d2d42; }
        .btn-direction:active { transform: translateY(3px); box-shadow: 0 2px 0 #0d2d42; }
        .rotate-btn { width: 115px; height: 115px; border-radius: 50%; background: radial-gradient(circle, var(--btn-blue) 30%, var(--btn-blue-dark) 100%); border: 6px solid #154666; color: #fff; font-size: 22px; box-shadow: 0 8px 0 #0d2d42; cursor: pointer; }

        /* 雲端作品區 */
        #gallery-section { width: 100%; height: 100dvh; background: #1a1a1a; overflow-y: auto; padding: 20px; text-align: center; position: fixed; top: 0; left: 0; z-index: 500; }
        .upload-box { background: #252525; padding: 20px; border-radius: 20px; margin: 20px 0; border: 2px dashed #444; }
        .upload-label { background: #FFD700; color: #000; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; display: inline-block; }
        .download-card { background: #252525; margin-bottom: 25px; padding: 15px; border-radius: 15px; border: 1px solid #333; text-align: left; }
        .download-card img { width: 100%; max-width: 280px; border-radius: 10px; margin: 10px auto; display: block; }
        .delete-btn { background: #ff3b30; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-family: 'ZCOOL KuaiLe'; margin-top: 10px; }

        /* 留言區樣式 */
        .comment-section { margin-top: 15px; border-top: 1px solid #444; padding-top: 10px; }
        .comment-list { max-height: 150px; overflow-y: auto; margin-bottom: 10px; font-size: 14px; }
        .comment-item { background: #333; padding: 5px 10px; border-radius: 5px; margin-bottom: 5px; color: #eee; }
        .comment-input-group { display: flex; gap: 5px; }
        .comment-input { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #444; background: #111; color: white; font-family: sans-serif; }
        .comment-btn { background: #2196F3; color: white; border: none; padding: 0 10px; border-radius: 5px; cursor: pointer; }

        /* 聊天室樣式 */
        #chat-section { width: 100%; height: 100dvh; background: #000; position: fixed; top: 0; left: 0; z-index: 1000; display: flex; flex-direction: column; padding: 60px 20px 20px; }
        .chat-box { flex: 1; background: #111; border: 1px solid #333; border-radius: 15px; overflow-y: auto; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .chat-msg { background: #222; padding: 10px 15px; border-radius: 12px; align-self: flex-start; max-width: 85%; color: #fff; line-height: 1.4; word-break: break-all; }
        .chat-input-area { display: flex; gap: 10px; }
        .chat-input { flex: 1; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #1a1a1a; color: white; font-size: 16px; }
        .chat-send-btn { background: #4CAF50; color: white; border: none; padding: 0 20px; border-radius: 10px; font-family: 'ZCOOL KuaiLe'; cursor: pointer; }

        .back-btn { position: fixed; top: 12px; left: 12px; background: #ff3b30; color: white; padding: 10px 15px; border: none; border-radius: 8px; z-index: 2000; cursor: pointer; font-family: 'ZCOOL KuaiLe'; font-size: 14px; }
    </style>
</head>
<body onclick="enableFullscreen()">

    <button id="global-back" class="back-btn hidden" onclick="location.reload()">⬅ 返回</button>

    <div id="main-menu">
        <h1 style="font-size: 45px; margin-bottom: 20px;">Darren Works</h1>
        <button class="portal-btn" style="background: #4CAF50;" onclick="showSection('game')">🎮 進入遊戲機</button>
        <button class="portal-btn" style="background: #2196F3;" onclick="showSection('gallery')">🖼️ 作品雲端區</button>
        <button class="portal-btn" style="background: #9C27B0;" onclick="showSection('chat')">💬 進入聊天室</button>
    </div>

    <div id="game-section" class="game-console hidden">
        <div class="header-title">▪ Darren 遊戲 ▪</div>
        <div class="screen-area">
            <div class="lcd-display">
                <div id="stats-ui" class="stats hidden">HI:<span id="hi">0</span><br>SC:<span id="sc">0</span><br><span id="l-wrap">LIFE:<span id="lives">1</span></span></div>
                <div id="game-start-ui" class="ui-overlay">
                    <h2 style="margin-bottom:10px;">選擇遊戲</h2>
                    <button class="menu-btn" onclick="startGame('tetris')">經典俄羅斯</button>
                    <button class="menu-btn" style="background:#444" onclick="startGame('snake')">經典貪吃蛇</button>
                    <button class="menu-btn" style="background:#555" onclick="startGame('dino')">🦖 經典小恐龍</button>
                    <div class="how-to-play">
                        <strong>【操作說明】</strong><br>
                        方向鍵：移動 / 改變方位<br>
                        旋轉鈕：變形 / 蛇加速 / 恐龍跳<br>
                        紅色鈕：重置遊戲 / 綠色鈕：暫停
                    </div>
                </div>
                <div id="over-ui" class="ui-overlay hidden">
                    <h2 style="margin-bottom:10px;">GAME OVER</h2>
                    <button class="menu-btn" style="background:#4CAF50" onclick="reset()">🔄 重新開始</button>
                    <button class="menu-btn" style="background:#2196F3" onclick="backToGameMenu()">🎮 回遊戲選單</button>
                </div>
                <canvas id="gc"></canvas>
            </div>
        </div>
        <div class="controller">
            <div class="d-pad">
                <div></div><button class="btn-direction" onclick="handle('up')"></button><div></div>
                <button class="btn-direction" onclick="handle('left')"></button>
                <div style="text-align:center;font-size:10px;padding-top:25px;color:#333;">MOVE</div>
                <button class="btn-direction" onclick="handle('right')"></button>
                <div></div><button class="btn-direction" onclick="handle('down')"></button><div></div>
            </div>
            <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; gap:15px;">
                <div style="display:flex;gap:12px;">
                    <button style="width:40px;height:40px;border-radius:50%;background:var(--btn-red);border:3px solid #800;box-shadow:0 3px 0 #400;" onclick="reset()"></button>
                    <button style="width:40px;height:40px;border-radius:50%;background:var(--btn-green);border:3px solid #060;box-shadow:0 3px 0 #030;" onclick="window.isPaused = !window.isPaused"></button>
                </div>
                <button class="rotate-btn" onclick="handle('rotate')">旋轉</button>
            </div>
        </div>
    </div>

    <div id="gallery-section" class="hidden">
        <h1 style="margin-top: 50px;">雲端作品集</h1>
        <div class="upload-box">
            <p style="margin-bottom:12px; color:#aaa;">照片</p>
            <label for="file-input" class="upload-label">➕ 選擇作品上傳</label>
            <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="uploadToCloud(event)">
        </div>
        <div id="gallery-list"></div>
    </div>

    <div id="chat-section" class="hidden">
        <div id="chat-display" class="chat-box">載入訊息中...</div>
        <div class="chat-input-area">
            <input type="text" id="chat-input-text" class="chat-input" placeholder="輸入訊息...">
            <button class="chat-send-btn" onclick="sendChatMessage()">傳送</button>
        </div>
    </div>

<script>
    // --- Firebase 配置 ---
    const firebaseConfig = { apiKey: "填入你的APIKEY", authDomain: "game-32947.firebaseapp.com", projectId: "game-32947", storageBucket: "game-32947.appspot.com", messagingSenderId: "填入你的ID", appId: "填入你的APPID" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const IMGBB_API_KEY = "74c0d1b38e2a215ca8291218ccecb1e4";
    const canvas=document.getElementById('gc'), ctx=canvas.getContext('2d');
    let gameLoop, mode, score=0, hiScore=0, lives=1, board, cur, curP, curColor, snake, food, dir;
    let dino, obstacles, gameSpeed;
    window.isPaused = false;
    const COLS=10, ROWS=20, SHAPES=[{s:[[1,1,1,1]],c:'#2980b9'},{s:[[1,1],[1,1]],c:'#f1c40f'},{s:[[0,1,0],[1,1,1]],c:'#8e44ad'},{s:[[1,1,0],[0,1,1]],c:'#27ae60'},{s:[[0,1,1],[1,1,0]],c:'#e67e22'},{s:[[1,0,0],[1,1,1]],c:'#d35400'},{s:[[0,0,1],[1,1,1]],c:'#2c3e50'}];

    function enableFullscreen() { if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(e => console.log(e)); } }
    
    function showSection(name) { 
        document.getElementById('main-menu').classList.add('hidden'); 
        document.getElementById('global-back').classList.remove('hidden'); 
        document.getElementById(name + '-section').classList.remove('hidden'); 
        if(name === 'gallery') loadGallery();
        if(name === 'chat') loadChat();
    }
    
    // --- 聊天功能 ---
    function loadChat() {
        db.collection("global_chat").orderBy("createdAt", "asc").limitToLast(50).onSnapshot((snapshot) => {
            const display = document.getElementById('chat-display');
            display.innerHTML = "";
            if (snapshot.empty) { display.innerHTML = "<p style='color:#666'>尚無訊息，快來聊天吧！</p>"; return; }
            snapshot.forEach(doc => {
                const data = doc.data();
                const msg = document.createElement('div');
                msg.className = 'chat-msg';
                msg.innerText = data.text;
                display.appendChild(msg);
            });
            display.scrollTop = display.scrollHeight;
        });
    }

    async function sendChatMessage() {
        const input = document.getElementById('chat-input-text');
        const text = input.value.trim();
        if (!text) return;
        try {
            await db.collection("global_chat").add({
                text: text,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = "";
        } catch (e) { alert("傳送失敗"); }
    }

    // --- 作品區 & 留言邏輯 ---
    function backToGameMenu() { document.getElementById('over-ui').classList.add('hidden'); document.getElementById('game-start-ui').classList.remove('hidden'); document.getElementById('stats-ui').classList.add('hidden'); clearInterval(gameLoop); ctx.clearRect(0,0,canvas.width,canvas.height); }
    async function uploadToCloud(event) { const file = event.target.files[0]; if (!file) return; const label = document.querySelector('.upload-label'); label.innerText = "⏳ 上傳中..."; const formData = new FormData(); formData.append("image", file); try { const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData }); const data = await response.json(); if (data.success) { await db.collection("photos").add({ url: data.data.url, name: file.name, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); alert("✅ 上傳成功！"); } } catch (e) { alert("上傳失敗"); } finally { label.innerText = "➕ 選擇作品上傳"; event.target.value = ''; } }
    async function addComment(photoId) { const input = document.getElementById(`input-${photoId}`); const text = input.value.trim(); if (!text) return; try { await db.collection("photos").doc(photoId).collection("comments").add({ text: text, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); input.value = ""; } catch (e) { alert("留言失敗"); } }
    function loadGallery() { db.collection("photos").orderBy("createdAt", "desc").onSnapshot((snapshot) => { const list = document.getElementById('gallery-list'); list.innerHTML = ""; snapshot.forEach((doc) => { const item = doc.data(); const photoId = doc.id; const card = document.createElement('div'); card.className = 'download-card'; card.innerHTML = `<p style="color:#aaa; font-size:12px; margin-bottom:5px;">${item.name || '作品'}</p><img src="${item.url}"><div style="display:flex; justify-content:center; gap:10px;"><a href="${item.url}" target="_blank" style="color:#FFEB3B; text-decoration:none; font-size:14px; margin-top:10px;">🖼️ 查看</a><button class="delete-btn" onclick="deletePhoto('${photoId}')">🗑️ 刪除</button></div><div class="comment-section"><div id="comments-${photoId}" class="comment-list">載入留言中...</div><div class="comment-input-group"><input type="text" id="input-${photoId}" class="comment-input" placeholder="說點什麼..."><button class="comment-btn" onclick="addComment('${photoId}')">傳送</button></div></div>`; list.appendChild(card); db.collection("photos").doc(photoId).collection("comments").orderBy("createdAt", "asc").onSnapshot((commentSnapshot) => { const commentDiv = document.getElementById(`comments-${photoId}`); if (!commentDiv) return; if (commentSnapshot.empty) { commentDiv.innerHTML = "<p style='color:#666'>尚無留言</p>"; return; } commentDiv.innerHTML = ""; commentSnapshot.forEach(cDoc => { const cData = cDoc.data(); const cItem = document.createElement('div'); cItem.className = 'comment-item'; cItem.innerText = cData.text; commentDiv.appendChild(cItem); }); commentDiv.scrollTop = commentDiv.scrollHeight; }); }); }); }
    async function deletePhoto(id) { if(confirm("確定要刪除這張圖片嗎？")) { await db.collection("photos").doc(id).delete(); alert("已刪除！"); } }

    // --- 遊戲邏輯 (不改動) ---
    function startGame(m){ mode=m; document.getElementById('game-start-ui').classList.add('hidden'); document.getElementById('stats-ui').classList.remove('hidden'); if(mode==='tetris' || mode==='dino') document.getElementById('l-wrap').classList.add('hidden'); else document.getElementById('l-wrap').classList.remove('hidden'); canvas.width=300; canvas.height=600; lives=(mode==='snake')?3:1; score=0; reset(); }
    function reset(){ window.isPaused=false; if(gameLoop) clearInterval(gameLoop); document.getElementById('over-ui').classList.add('hidden'); if(mode==='tetris'){ board=Array(ROWS).fill().map(()=>Array(COLS).fill(0)); newP(); gameLoop=setInterval(upd, 500); } else if(mode==='snake') { snake=[{x:5,y:10},{x:5,y:11},{x:5,y:12}]; dir={x:0,y:-1}; spawnF(); gameLoop=setInterval(upd, 180); } else if(mode==='dino') { dino = { y: 550, vy: 0 }; obstacles = []; gameSpeed = 8; gameLoop=setInterval(upd, 30); } updateStats(); }
    function upd(){ if(window.isPaused) return; if(mode==='tetris') updT(); else if(mode==='snake') updS(); else updD(); draw(); }
    function updD(){ score++; if(score % 500 === 0 && gameSpeed < 20) gameSpeed += 1; dino.vy += 1.5; dino.y += dino.vy; if(dino.y > 550) { dino.y = 550; dino.vy = 0; } let safeDist = gameSpeed * 26; if(Math.random() < 0.03) { if(obstacles.length === 0 || (300 - obstacles[obstacles.length-1].x) > safeDist) { obstacles.push({ x: 300, w: 20 + Math.random()*20, h: 30 + Math.random()*25 }); } } obstacles.forEach((o) => { o.x -= gameSpeed; if(o.x < 50 && o.x + o.w > 20 && (dino.y + 30) > (600 - o.h)) die(); }); if(obstacles.length > 0 && obstacles[0].x < -50) obstacles.shift(); updateStats(); }
    function newP(){ const r=SHAPES[Math.floor(Math.random()*SHAPES.length)]; cur=r.s; curColor=r.c; curP={x:4,y:0}; if(coll()) die(); }
    function coll(){ for(let y=0;y<cur.length;y++)for(let x=0;x<cur[y].length;x++) if(cur[y][x]&&(board[curP.y+y]===undefined||curP.x+x<0||curP.x+x>=COLS||board[curP.y+y][curP.x+x])) return true; return false; }
    function updT(){ curP.y++; if(coll()){ curP.y--; freeze(); clear(); newP(); } }
    function freeze(){ cur.forEach((r,y)=>r.forEach((v,x)=>{if(v)board[curP.y+y][curP.x+x]=curColor;})); }
    function clear(){ for(let y=ROWS-1;y>=0;y--)if(board[y].every(v=>v!==0)){board.splice(y,1);board.unshift(Array(COLS).fill(0));score+=100;updateStats();y++;} }
    function spawnF(){ food={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}; }
    function updS(){ const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y}; if(h.x<0||h.x>=COLS||h.y<0||h.y>=ROWS||snake.some(s=>s.x===h.x&&s.y===h.y))return die(); snake.unshift(h); if(h.x===food.x&&h.y===food.y){score+=10;updateStats();spawnF();} else snake.pop(); }
    function die(){ lives--; updateStats(); clearInterval(gameLoop); if(lives > 0) setTimeout(reset, 500); else document.getElementById('over-ui').classList.remove('hidden'); }
    function draw(){ ctx.clearRect(0,0,canvas.width,canvas.height); if(mode!=='dino'){ ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1; for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*30,0);ctx.lineTo(i*30,canvas.height);ctx.stroke();} for(let i=0;i<=ROWS;i++){ctx.beginPath();ctx.moveTo(0,i*30);ctx.lineTo(canvas.width,i*30);ctx.stroke();} } if(mode==='dino'){ ctx.fillStyle='#555'; ctx.fillRect(0, 580, 300, 20); ctx.fillStyle='#222'; ctx.fillRect(20, dino.y, 30, 30); ctx.fillStyle='#ff3b30'; obstacles.forEach(o => ctx.fillRect(o.x, 600-o.h, o.w, o.h)); } else if(mode==='tetris'){ board.forEach((r,y)=>r.forEach((v,x)=>{if(v)blk(x,y,v);})); cur.forEach((r,y)=>r.forEach((v,x)=>{if(v)blk(curP.x+x,curP.y+y,curColor);})); } else if(mode==='snake') { snake.forEach(s=>blk(s.x,s.y,'#222')); blk(food.x,food.y,'#ff3b30'); } }
    function blk(x,y,c){ ctx.fillStyle=c; ctx.fillRect(x*30+1,y*30+1,28,28); ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.strokeRect(x*30+1,y*30+1,28,28); }
    function handle(k){ if(window.isPaused||lives<=0)return; if(mode==='tetris'){ if(k==='left'){curP.x--;if(coll())curP.x++;} if(k==='right'){curP.x++;if(coll())curP.x--;} if(k==='down'){curP.y++;if(coll())curP.y--;} if(k==='rotate'||k==='up'){let n=cur[0].map((_,i)=>cur.map(r=>r[i]).reverse());let p=cur;cur=n;if(coll())cur=p;} } else if(mode==='snake'){ if(k==='up'&&dir.y===0)dir={x:0,y:-1}; if(k==='down'&&dir.y===0)dir={x:0,y:1}; if(k==='left'&&dir.x===0)dir={x:-1,y:0}; if(k==='right'&&dir.x===0)dir={x:1,y:0}; } else if(mode==='dino'){ if((k==='up'||k==='rotate') && dino.y >= 550){ dino.vy = -22; } } draw(); }
    function updateStats(){ document.getElementById('sc').innerText=score; document.getElementById('lives').innerText=lives; if(score>hiScore)hiScore=score; document.getElementById('hi').innerText=hiScore; }
</script>
</body>
</html>
