<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Darren 終極遊戲基地</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    <style>
        :root { --case-yellow: #e4c541; --screen-frame: #000; --lcd-bg: #9ead86; --btn-blue: #4a90e2; --btn-blue-dark: #1c5980; --btn-red: #ff3b30; --btn-green: #44db5e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; font-family: 'ZCOOL KuaiLe', sans-serif; color: white; }
        .hidden { display: none !important; }

        #main-menu { display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 100; }
        .portal-btn { width: 260px; padding: 22px; font-size: 24px; border: none; border-radius: 15px; cursor: pointer; color: white; font-family: 'ZCOOL KuaiLe'; box-shadow: 0 6px 0 #222; transition: 0.1s; }
        .portal-btn:active { transform: translateY(4px); box-shadow: none; }

        .game-console { background: var(--case-yellow); width: 100vw; max-width: 480px; height: 100dvh; display: flex; flex-direction: column; align-items: center; position: relative; color: #000; }
        .header-title { margin: 8px 0; font-size: 18px; font-weight: bold; letter-spacing: 5px; }
        .screen-area { width: 92%; border: 10px solid var(--screen-frame); padding: 5px; border-radius: 8px; background: #222; }
        .lcd-display { background: var(--lcd-bg); width: 100%; height: 400px; position: relative; box-shadow: inset 4px 4px 12px rgba(0,0,0,0.4); border: 2px solid #7a8a64; overflow: hidden; }
        canvas { width: 100%; height: 100%; image-rendering: pixelated; display: block; }
        
        .stats { position: absolute; left: 8px; top: 8px; font-size: 14px; font-weight: bold; z-index: 10; color: #000; }
        .ui-overlay { position: absolute; inset: 0; background: var(--lcd-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        .menu-btn { width: 180px; padding: 12px; margin: 8px; font-size: 18px; background: #333; color: #fff; border: none; border-radius: 10px; cursor: pointer; }
        
        .controller { width: 100%; flex-grow: 1; display: grid; grid-template-columns: 1.1fr 0.9fr; padding: 5px; transform: scale(0.85); transform-origin: top; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); gap: 8px; justify-self: center; align-self: center; }
        .btn-direction { background: radial-gradient(circle, var(--btn-blue) 30%, var(--btn-blue-dark) 100%); border-radius: 50%; border: 4px solid #154666; box-shadow: 0 5px 0 #0d2d42; }
        .rotate-btn { width: 105px; height: 105px; border-radius: 50%; background: radial-gradient(circle, var(--btn-blue) 30%, var(--btn-blue-dark) 100%); border: 6px solid #154666; color: #fff; font-size: 20px; box-shadow: 0 7px 0 #0d2d42; cursor: pointer; }

        #gallery-section { width: 100%; height: 100dvh; background: #000; overflow-y: auto; padding: 20px; text-align: center; position: fixed; top: 0; left: 0; z-index: 200; }
        .upload-box { background: #1a1a1a; padding: 20px; border-radius: 20px; margin: 20px 0; border: 2px dashed #444; }
        .upload-label { background: #FFD700; color: #000; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; display: inline-block; }
        .download-card { background: #1a1a1a; margin-bottom: 25px; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .download-card img { width: 100%; max-width: 280px; border-radius: 10px; }
        .delete-btn { background: #ff3b30; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .back-btn { position: fixed; top: 12px; left: 12px; background: #ff3b30; color: white; padding: 10px 15px; border: none; border-radius: 8px; z-index: 300; cursor: pointer; font-family: 'ZCOOL KuaiLe'; }
    </style>
</head>
<body>

    <button id="global-back" class="back-btn hidden" onclick="location.reload()">⬅ 返回</button>

    <div id="main-menu">
        <h1 style="font-size: 45px; margin-bottom: 20px;">Darren Works</h1>
        <button class="portal-btn" style="background: #4CAF50;" onclick="showSection('game')">🎮 進入遊戲機</button>
        <button class="portal-btn" style="background: #2196F3;" onclick="showSection('gallery')">🖼️ 作品雲端區</button>
    </div>

    <div id="game-section" class="game-console hidden">
        <div class="header-title">▪ Darren 遊戲 ▪</div>
        <div class="screen-area">
            <div class="lcd-display">
                <div id="stats-ui" class="stats hidden">SC:<span id="sc">0</span></div>
                <div id="game-start-ui" class="ui-overlay">
                    <h2 style="margin-bottom:10px;">選擇遊戲</h2>
                    <button class="menu-btn" onclick="startGame('tetris')">經典俄羅斯</button>
                    <button class="menu-btn" onclick="startGame('snake')">經典貪吃蛇</button>
                    <button class="menu-btn" style="background:#555" onclick="startGame('dino')">跳躍小恐龍</button>
                </div>
                <div id="over-ui" class="ui-overlay hidden">
                    <h2 style="margin-bottom:10px;">GAME OVER</h2>
                    <button class="menu-btn" onclick="location.reload()">回首頁</button>
                </div>
                <canvas id="gc"></canvas>
            </div>
        </div>
        <div class="controller">
            <div class="d-pad">
                <div></div><button class="btn-direction" onclick="handle('up')"></button><div></div>
                <button class="btn-direction" onclick="handle('left')"></button>
                <div style="text-align:center;font-size:10px;padding-top:20px;">MOVE</div>
                <button class="btn-direction" onclick="handle('right')"></button>
                <div></div><button class="btn-direction" onclick="handle('down')"></button><div></div>
            </div>
            <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;">
                <div style="display:flex;gap:10px;">
                    <button style="width:35px;height:35px;border-radius:50%;background:var(--btn-red);" onclick="location.reload()"></button>
                    <button style="width:35px;height:35px;border-radius:50%;background:var(--btn-green);" onclick="window.isPaused = !window.isPaused"></button>
                </div>
                <button class="rotate-btn" onclick="handle('rotate')">跳躍/旋轉</button>
            </div>
        </div>
    </div>

    <div id="gallery-section" class="hidden">
        <h1 style="margin-top: 50px;">雲端作品集</h1>
        <div class="upload-box">
            <label for="file-input" class="upload-label">➕ 選擇作品上傳</label>
            <input type="file" id="file-input" accept="image/*" style="display:none" onchange="uploadToCloud(this)">
        </div>
        <div id="gallery-list"></div>
    </div>

    <script>
        const IMGBB_KEY = '74c0d1b38e2a215ca8291218ccecb1e4';
        const firebaseConfig = { apiKey: "AIzaSyADMWPjGyJfLuAxHEetHi3pNe56pCunpQk", authDomain: "game-32947.firebaseapp.com", projectId: "game-32947", storageBucket: "game-32947.firebasestorage.app", messagingSenderId: "267668983459", appId: "1:267668983459:web:46d538524d46058ec2b916" };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const canvas = document.getElementById('gc');
        const ctx = canvas.getContext('2d');
        const GRID_SIZE = 20; // 每個格子的大小
        let gameLoop, score = 0;
        window.currentGame = '';
        window.isPaused = false;

        let snake = [], apple = {}, snakeDir = 'RIGHT';
        let dino = { x: 30, y: 0, v: 0, jumping: false }, obstacles = [];

        function showSection(id) {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById(id + '-section').classList.remove('hidden');
            document.getElementById('global-back').classList.remove('hidden');
            if(id === 'game') { canvas.width = 200; canvas.height = 400; drawGrid(); }
            if(id === 'gallery') loadGallery();
        }

        // 繪製背景格子
        function drawGrid() {
            ctx.strokeStyle = "rgba(0, 0, 0, 0.05)";
            ctx.lineWidth = 1;
            for (let x = 0; x <= canvas.width; x += GRID_SIZE) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += GRID_SIZE) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
        }

        function startGame(type) {
            window.currentGame = type;
            document.getElementById('game-start-ui').classList.add('hidden');
            document.getElementById('stats-ui').classList.remove('hidden');
            score = 0; document.getElementById('sc').innerText = '0';
            clearInterval(gameLoop);
            
            if(type === 'snake') { snake = [{x:5,y:5}]; apple={x:10,y:10}; snakeDir='RIGHT'; gameLoop=setInterval(updateSnake, 150); }
            if(type === 'dino') { dino={x:30,y:300,v:0,jumping:false}; obstacles=[]; gameLoop=setInterval(updateDino, 20); }
            if(type === 'tetris') { score = 0; gameLoop=setInterval(() => { ctx.clearRect(0,0,200,400); drawGrid(); ctx.fillText("俄羅斯方塊開發中", 50, 50); }, 100); }
        }

        function updateSnake() {
            if(window.isPaused) return;
            let head = {...snake[0]};
            if(snakeDir==='UP') head.y--; if(snakeDir==='DOWN') head.y++; if(snakeDir==='LEFT') head.x--; if(snakeDir==='RIGHT') head.x++;
            
            if(head.x<0||head.x>=canvas.width/GRID_SIZE||head.y<0||head.y>=canvas.height/GRID_SIZE) return gameOver();
            snake.unshift(head);
            if(head.x===apple.x && head.y===apple.y) { 
                score++; 
                apple={x:Math.floor(Math.random()*(canvas.width/GRID_SIZE)), y:Math.floor(Math.random()*(canvas.height/GRID_SIZE))}; 
            } else { snake.pop(); }
            
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawGrid();
            ctx.fillStyle='#222'; 
            snake.forEach(s=>ctx.fillRect(s.x*GRID_SIZE, s.y*GRID_SIZE, GRID_SIZE-1, GRID_SIZE-1));
            ctx.fillStyle='#ff3b30'; ctx.fillRect(apple.x*GRID_SIZE, apple.y*GRID_SIZE, GRID_SIZE-1, GRID_SIZE-1);
            document.getElementById('sc').innerText = score;
        }

        function updateDino() {
            if(window.isPaused) return;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawGrid();
            dino.v += 0.6; dino.y += dino.v;
            if(dino.y > 320) { dino.y = 320; dino.v = 0; dino.jumping = false; }
            if(Math.random()<0.02) obstacles.push({x:200, w:15, h:20+Math.random()*20});
            ctx.fillStyle='#222'; ctx.fillRect(dino.x, dino.y, 20, 25);
            ctx.fillRect(0, 345, 200, 2);
            for(let i=obstacles.length-1; i>=0; i--) {
                obstacles[i].x -= 4; ctx.fillRect(obstacles[i].x, 345-obstacles[i].h, obstacles[i].w, obstacles[i].h);
                if(dino.x<obstacles[i].x+obstacles[i].w && dino.x+20>obstacles[i].x && dino.y+25>345-obstacles[i].h) return gameOver();
                if(obstacles[i].x<-20) { obstacles.splice(i,1); score++; document.getElementById('sc').innerText = score; }
            }
        }

        function handle(action) {
            if(window.currentGame==='snake') {
                if(action==='up'&&snakeDir!=='DOWN') snakeDir='UP'; if(action==='down'&&snakeDir!=='UP') snakeDir='DOWN';
                if(action==='left'&&snakeDir!=='RIGHT') snakeDir='LEFT'; if(action==='right'&&snakeDir!=='LEFT') snakeDir='RIGHT';
            }
            if(window.currentGame==='dino' && (action==='up'||action==='rotate') && !dino.jumping) {
                dino.v = -10; dino.jumping = true;
            }
        }

        function gameOver() { clearInterval(gameLoop); document.getElementById('over-ui').classList.remove('hidden'); }

        async function uploadToCloud(input) {
            if(!input.files[0]) return;
            const body = new FormData(); body.append('image', input.files[0]);
            try {
                const res = await fetch(`https://api.imgbb.com{IMGBB_KEY}`, {method:'POST', body});
                const data = await res.json();
                await db.collection('gallery').add({url: data.data.url, time: Date.now()});
                loadGallery();
            } catch (e) { alert('上傳失敗'); }
        }

        async function loadGallery() {
            const list = document.getElementById('gallery-list'); list.innerHTML = '載入中...';
            const snap = await db.collection('gallery').orderBy('time','desc').get();
            list.innerHTML = '';
            snap.forEach(doc => {
                const div = document.createElement('div'); div.className = 'download-card';
                div.innerHTML = `<img src="${doc.data().url}"><br><button class="delete-btn" onclick="deleteImg('${doc.id}')">刪除</button>`;
                list.appendChild(div);
            });
        }
        async function deleteImg(id) { if(confirm('確定要刪除嗎？')) { await db.collection('gallery').doc(id).delete(); loadGallery(); } }
    </script>
</body>
</html>
